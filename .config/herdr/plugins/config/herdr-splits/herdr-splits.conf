# herdr-splits plugin config — read by both the Neovim Lua side
# (lua/herdr-splits/herdr.lua) and the herdr-side nav scripts.
#
# Default (unset) is unzoom_on_nav=true: since v0.3.0 the plugin auto-unzooms
# when ctrl+h/j/k/l crosses from a zoomed Neovim pane into a sibling herdr pane,
# so you land on an un-zoomed split. We don't want that — herdr's own
# `pane focus` already does zoom-follows-focus (focus moves, zoom stays on the
# newly focused pane). Disabling the plugin's unzoom lets that native behavior
# through: zoom left, ctrl+l → right pane stays zoomed.
unzoom_on_nav=false
