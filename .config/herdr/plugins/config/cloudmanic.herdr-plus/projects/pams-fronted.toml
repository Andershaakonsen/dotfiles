# herdr-plus project template: PAMS Frontend
# Opened via the "Herdr Plus: Projects" action — spins up a new herdr
# workspace rooted at working_dir with one tab per [[tabs]] entry.

name = "PAMS-Frontend"
description = "PAMS Frontend (React SPA)"
working_dir = "~/pams/PAMS-Frontend"

[[tabs]]
name = "c&e"

[[tabs.panes]]
label = "Editor"
command = "v ."

[[tabs.panes]]
label = "Claude"
command = "claude"
split = "right"

[[tabs]]
name = "dev"

[[tabs.panes]]
label = "npm"
command = "npm run dev"

[[tabs.panes]]
name = "lazygit"
command = "lg"   # lg = lazygit alias
split = "right"
