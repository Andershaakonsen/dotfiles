# herdr-plus project template: dotfiles workspace
# Opened via the "Herdr Plus: Projects" action — spins up a new herdr
# workspace rooted at working_dir with one tab per [[tabs]] entry.

name = "dotfiles"
description = "Personal macOS dotfiles"
working_dir = "~/dotfiles"

[[tabs]]
name = "C & E"

[[tabs.panes]]
name = "editor"
command = "v"   # v = nvim alias

[[tabs.panes]]
name = "claude"
command = "claude"
split = "right"


[[tabs]]
name = "LG"
command = "lg" # lg = lazygit alias
